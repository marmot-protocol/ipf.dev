<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internet Privacy Foundation</title>
  <meta name="description" content="Internet Privacy Foundation - Defending digital freedom and privacy rights">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="IPF" />
  <link rel="manifest" href="/site.webmanifest" />

  <link rel="preload" href="./fonts/Supreme-Variable.ttf" as="font" type="font/ttf" crossorigin>
  <script defer src="https://analytics.ipf.dev/script.js" data-website-id="942e1c4a-cc82-4c41-864c-cc44f70cee8e"></script>

  <style>
    @font-face {
      font-family: 'Supreme';
      src: url('./fonts/Supreme-Variable.ttf') format('truetype-variations'),
           url('./fonts/Supreme-Variable.ttf') format('truetype');
      font-weight: 200 800;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Supreme';
      src: url('./fonts/Supreme-VariableItalic.ttf') format('truetype-variations'),
           url('./fonts/Supreme-VariableItalic.ttf') format('truetype');
      font-weight: 200 800;
      font-style: italic;
      font-display: swap;
    }

    :root {
      --bg: #000000;
      --text: #ffffff;
      --text-muted: #8a8a8a;
      --accent: #2f5bff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Supreme', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    h1 {
      font-family: 'Supreme', system-ui, sans-serif;
      font-size: clamp(2.25rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
      text-transform: lowercase;
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: clamp(1rem, 1.4vw, 1.125rem);
      line-height: 1.5;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 2.5rem;
      max-width: 34rem;
      text-transform: lowercase;
    }

    .projects {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .projects a {
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      text-transform: lowercase;
      transition: color 0.2s ease;
    }

    .projects a:hover {
      color: var(--accent);
    }

    .socials {
      display: flex;
      gap: 2rem;
      justify-content: center;
    }

    .socials a {
      color: var(--accent);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      text-transform: lowercase;
      transition: opacity 0.2s ease;
    }

    .socials a:hover {
      opacity: 0.75;
    }

    footer {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      padding: 1rem 0;
      text-transform: lowercase;
    }

    /* Mobile: left-aligned, Title Case */
    @media (max-width: 640px) {
      body {
        padding: 1.5rem;
      }

      main {
        align-items: flex-start;
        justify-content: center;
        text-align: left;
      }

      h1,
      .tagline,
      .projects a,
      .socials a,
      footer {
        text-transform: none;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.05;
        max-width: 12ch;
      }

      .tagline {
        margin-bottom: 2rem;
      }

      .projects {
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 0.75rem;
      }

      .socials {
        justify-content: flex-start;
        gap: 1.5rem;
      }

      footer {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>internet privacy foundation</h1>

    <p class="tagline">
      defending digital freedom and the fundamental right to privacy in an increasingly connected world
    </p>

    <nav class="projects">
      <a href="https://github.com/marmot-protocol/marmot" target="_blank" rel="noopener noreferrer">marmot protocol</a>
      <a href="https://github.com/marmot-protocol/mdk" target="_blank" rel="noopener noreferrer">marmot development kit</a>
      <a href="https://github.com/marmot-protocol/marmot-ts" target="_blank" rel="noopener noreferrer">marmot-ts</a>
      <a href="https://whitenoise.chat" target="_blank" rel="noopener noreferrer">white noise</a>
    </nav>

    <nav class="socials">
      <a href="/donate">donate</a>
      <a href="https://github.com/marmot-protocol" target="_blank" rel="noopener noreferrer">github</a>
      <a href="&#109;&#97;&#105;&#108;&#116;&#111;&#58;&#105;&#110;&#102;&#111;&#64;&#105;&#112;&#102;&#46;&#100;&#101;&#118;">email</a>
    </nav>
  </main>

  <footer>
    ©2025-2026 internet privacy foundation
  </footer>
</body>
</html>
